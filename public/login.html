<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Carpark Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <div style="font-size:3.5rem; color: var(--primary);">
          <i class="bi bi-p-square-fill"></i>
        </div>
        <h1>CAR STORAGE<br>MANAGEMENT SYSTEM</h1>
        <p id="carpark-name">BOI Car Storage Yard</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" placeholder="Enter username" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
            <button class="btn btn-outline-secondary" type="button" id="togglePass">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <div id="loginError" class="alert alert-danger d-none"></div>
        <button type="submit" class="btn w-100 btn-lg" style="background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; font-weight: 700;">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <p class="text-muted text-center mt-3 small">
        &copy; 2026 Car Storage Management System
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Check if already logged in
    fetch('/api/auth/me', { credentials: 'include' }).then(r => {
      if (r.ok) window.location.href = '/menu.html';
    }).catch(() => {});

    // Load carpark name
    fetch('/api/dashboard/carpark-info', { credentials: 'include' }).then(r => r.json()).then(d => {
      if (d.name) document.getElementById('carpark-name').textContent = d.name;
    }).catch(() => {});

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');
      errEl.classList.add('d-none');

      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });
        const data = await res.json();
        if (res.ok) {
          window.location.href = '/menu.html';
        } else {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('d-none');
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
        }
      } catch(err) {
        errEl.textContent = 'Connection error. Please try again.';
        errEl.classList.remove('d-none');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>Sign In';
      }
    });

    // Toggle password visibility
    document.getElementById('togglePass').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const icon = document.querySelector('#togglePass i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });
  </script>
</body>
</html>
